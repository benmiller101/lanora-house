[build]
  command = "npm run build"
  publish = "dist/public"

# Proxy all API calls to the backend server (Railway/Render/etc.)
# Replace BACKEND_URL with your actual backend deployment URL after deploying the backend.
[[redirects]]
  from = "/api/*"
  to = "https://BACKEND_URL/api/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/uploads/*"
  to = "https://BACKEND_URL/uploads/:splat"
  status = 200
  force = true

# SPA fallback — all unmatched routes serve index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
